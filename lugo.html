    <img class="lista-imagen-hover" id="imgHover" src="" alt="">

    <main class="contenedor-galeria">

        <ul class="lista-galeria">

            <li class="lista-item" data-img="recursos/lugo/pedrafita_do_cebreiro2-2025.jpeg">

                    <span class="lista-numero">01</span>

                        <span>2025</span>

                    </span>

            <li class="lista-item" data-img="recursos/lugo/pedrafita_do_cebreiro-2025.jpeg">
                <a href="https://www.vinted.es/" target="_blank" class="lista-link">
                    <span class="lista-numero">02</span>

    <footer>
        <p>&copy; 2026 Proxecto Web - Adrián Vázquez & Samuel Reinaldo. <a href="privacidad.html">Política de Privacidade</a></p>
    </footer>

    <script>
        const imgHover = document.getElementById('imgHover');
        const items = document.querySelectorAll('.lista-item[data-img]');

        document.addEventListener('mousemove', (e) => {
            let x = e.clientX + 30;
            let y = e.clientY - 130;
            if (x + 380 > window.innerWidth) x = e.clientX - 410;
            if (y < 10) y = 10;
            imgHover.style.left = x + 'px';
            imgHover.style.top = y + 'px';
        });

        items.forEach(item => {
            item.addEventListener('mouseenter', () => {
                if (item.dataset.img) {
                    imgHover.src = item.dataset.img;
                    imgHover.classList.add('visible');
                }
            });
            item.addEventListener('mouseleave', () => {
                imgHover.classList.remove('visible');
            });
        });
    </script>
</body>
